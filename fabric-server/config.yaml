name: Minecraft Server
version: "2.0.0"
slug: fabric_server
description: >-
  Multi-type Minecraft server: Vanilla, Paper, Purpur, Fabric, Forge, Bedrock
  (BDS), and EaglercraftX — all configurable from the Home Assistant UI with a
  built-in web console dashboard.
url: https://minecraft.net/
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
host_network: true
ingress: true
ingress_port: 8099
hassio_api: true
map:
  - type: data
    read_only: false
  - type: addon_config
    read_only: false
  - type: share
    read_only: false
options:
  # ── Server type ──────────────────────────────────────────────────────────
  # vanilla      : Official Mojang server — no mods, maximum compatibility.
  # paper        : High-performance Spigot fork; supports Bukkit/Spigot plugins.
  # purpur       : Paper fork with extra configuration knobs; supports plugins.
  # fabric       : Fabric mod loader (default); manages mods via Modrinth.
  # forge        : Forge mod loader; requires a specific minecraft_version.
  # bds          : Bedrock Dedicated Server — Bedrock clients only, no Java.
  # eaglercraft  : EaglercraftX — browser-playable; place JAR manually first.
  server_type: "fabric"

  # ── Required ─────────────────────────────────────────────────────────────
  accept_eula: false

  # ── Versions ─────────────────────────────────────────────────────────────
  minecraft_version: "latest"
  # Fabric only
  fabric_loader_version: "latest"
  # Forge only — "latest" picks the recommended build, or pin e.g. "54.1.0"
  forge_version: "latest"

  # ── Memory & JVM (Java server types only) ────────────────────────────────
  max_memory: "2G"
  min_memory: "1G"
  java_args: ""

  # ── Server properties (all types unless noted) ───────────────────────────
  motd: "A Minecraft server, powered by Home Assistant"
  gamemode: "survival"
  difficulty: "normal"
  hardcore: false
  max_players: 20
  online_mode: true
  white_list: false
  pvp: true
  allow_nether: true
  allow_flight: false
  spawn_protection: 16
  view_distance: 10
  simulation_distance: 10
  level_name: "world"
  level_seed: ""
  level_type: "minecraft:normal"
  enable_command_block: false
  op_permission_level: 4
  player_idle_timeout: 0
  ops: []
  whitelist: []

  # ── Bedrock cross-play via Geyser + Floodgate ────────────────────────────
  # Supported on: fabric, paper, purpur, forge (downloaded from Modrinth for
  # the matching loader). Not applicable to: vanilla (no plugin/mod loader),
  # bds (already native Bedrock), eaglercraft (separate ecosystem).
  geyser_enabled: true
  bedrock_port: 19132
  geyser_motd: "Minecraft Server"
  floodgate_enabled: true

  # ── Protocol version compatibility ───────────────────────────────────────
  # Supported on: fabric (ViaFabric), paper/purpur (ViaVersion plugin),
  # forge (ViaForge). Not applicable to: vanilla, bds, eaglercraft.
  viaversion_enabled: false
  viabackwards_enabled: false
  viarewind_enabled: false

  # ── Optimization mods (Fabric only) ──────────────────────────────────────
  # These are Fabric-specific mods with no Paper/Purpur/Forge equivalent;
  # ignored (with a log warning) on every other server type.
  mod_lithium: true
  mod_ferritecore: true
  mod_krypton: true
  mod_c2me: false
  mod_servercore: false

  # ── Extra Modrinth mods/plugins ──────────────────────────────────────────
  # Supported on: fabric, paper, purpur, forge — tried against the active
  # loader's Modrinth builds. Not applicable to: vanilla, bds, eaglercraft.
  extra_mods: []

schema:
  server_type: "list(vanilla|paper|purpur|fabric|forge|bds|eaglercraft)"
  accept_eula: bool
  minecraft_version: str
  fabric_loader_version: str
  forge_version: str
  max_memory: "match(^[0-9]+[KkMmGg]?$)"
  min_memory: "match(^[0-9]+[KkMmGg]?$)"
  java_args: str
  motd: str
  gamemode: "list(survival|creative|adventure|spectator)"
  difficulty: "list(peaceful|easy|normal|hard)"
  hardcore: bool
  max_players: "int(1,)"
  online_mode: bool
  white_list: bool
  pvp: bool
  allow_nether: bool
  allow_flight: bool
  spawn_protection: "int(0,)"
  view_distance: "int(3,32)"
  simulation_distance: "int(3,32)"
  level_name: str
  level_seed: str
  level_type: str
  enable_command_block: bool
  op_permission_level: "int(1,4)"
  player_idle_timeout: "int(0,)"
  ops:
    - str
  whitelist:
    - str
  geyser_enabled: bool
  bedrock_port: "int(1,65535)"
  geyser_motd: str
  floodgate_enabled: bool
  viaversion_enabled: bool
  viabackwards_enabled: bool
  viarewind_enabled: bool
  mod_lithium: bool
  mod_ferritecore: bool
  mod_krypton: bool
  mod_c2me: bool
  mod_servercore: bool
  extra_mods:
    - str
ports:
  25565/tcp: 25565
  19132/udp: 19132
ports_description:
  25565/tcp: Minecraft Java Edition
  19132/udp: Minecraft Bedrock Edition (Geyser / BDS)
panel_icon: mdi:minecraft
panel_title: Minecraft Server
