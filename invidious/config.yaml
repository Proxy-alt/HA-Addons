name: Invidious
version: "2024.12.1"
slug: invidious
description: >-
  Privacy-respecting YouTube frontend. Watch YouTube videos without ads,
  tracking, or a Google account.
url: https://github.com/iv-org/invidious
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
host_network: true
# hassio_api lets run.sh write the auto-generated HMAC key back to the add-on
# options via the Supervisor API (POST /addons/self/options) so it shows up in
# the UI and survives restarts.
hassio_api: true
map:
  - type: data
    read_only: false
options:
  # ── Server ─────────────────────────────────────────────────────────────────
  hmac_key: ""
  domain: ""
  external_port: 0
  alternative_domains: []
  https_only: false
  hsts: true
  # ── Network (outbound) ─────────────────────────────────────────────────────
  disable_proxy: "false"
  pool_size: 100
  force_resolve: ""
  cookies: ""
  use_innertube_for_captions: false
  http_proxy_host: ""
  http_proxy_port: 3128
  http_proxy_user: ""
  http_proxy_password: ""
  # ── Logging ────────────────────────────────────────────────────────────────
  log_level: "Info"
  # ── Features ───────────────────────────────────────────────────────────────
  popular_enabled: true
  statistics_enabled: false
  # ── Users & accounts ───────────────────────────────────────────────────────
  registration_enabled: true
  login_enabled: true
  captcha_enabled: true
  admins: []
  enable_user_notifications: true
  # ── Background jobs ────────────────────────────────────────────────────────
  channel_threads: 1
  feed_threads: 1
  channel_refresh_interval: "30m"
  full_refresh: false
  jobs_clear_expired_items: true
  jobs_refresh_channels: true
  jobs_refresh_feeds: true
  # ── Database ───────────────────────────────────────────────────────────────
  check_tables: true
  # ── Miscellaneous ──────────────────────────────────────────────────────────
  banner: ""
  use_pubsub_feeds: "false"
  cache_annotations: false
  playlist_length_limit: 500
  dmca_content: []
  # ── Invidious Companion ────────────────────────────────────────────────────
  companion_private_url: ""
  companion_public_url: ""
  companion_key: ""
  # ── Default user preferences ───────────────────────────────────────────────
  locale: "en-US"
  region: "US"
  dark_mode: "auto"
  thin_mode: false
  default_home: "Popular"
  feed_menu:
    - "Popular"
    - "Trending"
    - "Subscriptions"
    - "Playlists"
  max_results: 40
  annotations: false
  annotations_subscribed: false
  comments_1: "youtube"
  comments_2: ""
  player_style: "invidious"
  related_videos: true
  preload: true
  autoplay: false
  continue_videos: false
  continue_autoplay: true
  listen: false
  video_loop: false
  quality: "dash"
  quality_dash: "auto"
  speed: 1.0
  volume: 100
  vr_mode: true
  save_player_pos: false
  latest_only: false
  notifications_only: false
  unseen_only: false
  sort: "published"
  proxy_videos: false
  show_nick: true
  automatic_instance_redirect: false
  extend_desc: false
  caption_1: ""
  caption_2: ""
  caption_3: ""
schema:
  # ── Server ─────────────────────────────────────────────────────────────────
  hmac_key: str
  domain: str
  external_port: int
  alternative_domains:
    - str
  https_only: bool
  hsts: bool
  # ── Network (outbound) ─────────────────────────────────────────────────────
  disable_proxy: str
  pool_size: int
  force_resolve: str
  cookies: str
  use_innertube_for_captions: bool
  http_proxy_host: str
  http_proxy_port: int
  http_proxy_user: str
  http_proxy_password: password
  # ── Logging ────────────────────────────────────────────────────────────────
  log_level: str
  # ── Features ───────────────────────────────────────────────────────────────
  popular_enabled: bool
  statistics_enabled: bool
  # ── Users & accounts ───────────────────────────────────────────────────────
  registration_enabled: bool
  login_enabled: bool
  captcha_enabled: bool
  admins:
    - str
  enable_user_notifications: bool
  # ── Background jobs ────────────────────────────────────────────────────────
  channel_threads: int
  feed_threads: int
  channel_refresh_interval: str
  full_refresh: bool
  jobs_clear_expired_items: bool
  jobs_refresh_channels: bool
  jobs_refresh_feeds: bool
  # ── Database ───────────────────────────────────────────────────────────────
  check_tables: bool
  # ── Miscellaneous ──────────────────────────────────────────────────────────
  banner: str
  use_pubsub_feeds: str
  cache_annotations: bool
  playlist_length_limit: int
  dmca_content:
    - str
  # ── Invidious Companion ────────────────────────────────────────────────────
  companion_private_url: str
  companion_public_url: str
  companion_key: password
  # ── Default user preferences ───────────────────────────────────────────────
  locale: str
  region: str
  dark_mode: str
  thin_mode: bool
  default_home: str
  feed_menu:
    - str
  max_results: int
  annotations: bool
  annotations_subscribed: bool
  comments_1: str
  comments_2: str
  player_style: str
  related_videos: bool
  preload: bool
  autoplay: bool
  continue_videos: bool
  continue_autoplay: bool
  listen: bool
  video_loop: bool
  quality: str
  quality_dash: str
  speed: float
  volume: int
  vr_mode: bool
  save_player_pos: bool
  latest_only: bool
  notifications_only: bool
  unseen_only: bool
  sort: str
  proxy_videos: bool
  show_nick: bool
  automatic_instance_redirect: bool
  extend_desc: bool
  caption_1: str
  caption_2: str
  caption_3: str
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Invidious Web Interface
ingress: true
ingress_port: 3000
panel_icon: mdi:youtube
panel_title: Invidious
