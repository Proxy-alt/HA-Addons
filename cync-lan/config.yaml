name: Cync LAN
version: "1.0.0"
slug: cync-lan
description: >-
  Local, cloud-free MQTT control of GE Cync / C by GE Wi-Fi smart lighting.
  Emulates the Cync cloud server so devices redirected to it over DNS stay
  on the LAN, and bridges them into Home Assistant over MQTT.
url: https://github.com/baudneo/cync-lan
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
# Cync Wi-Fi devices are redirected here via a DNS override that points at
# this host's LAN IP (see DOCS.md); host_network keeps the add-on reachable
# on that same address rather than a NATed bridge IP.
host_network: true
# Lets run.sh write an auto-generated secret_key back to the add-on options
# via the Supervisor API (POST /addons/self/options) so it persists and
# shows up in the UI, the same way the Invidious add-on handles hmac_key.
hassio_api: true
map:
  - type: data
    read_only: false
options:
  account_username: ""
  account_password: ""
  enable_exporter: true
  secret_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic: "cync_lan"
  max_tcp_connections: 8
  tcp_whitelist: []
  cloud_ip: "34.73.130.191"
  debug: false
schema:
  account_username: str
  account_password: password
  enable_exporter: bool
  secret_key: password
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
  mqtt_topic: str
  max_tcp_connections: "int(1,64)"
  tcp_whitelist:
    - str
  cloud_ip: str
  debug: bool
ports:
  23779/tcp: 23779
  23778/tcp: 23778
ports_description:
  23779/tcp: Cync device connections — point your DNS override here
  23778/tcp: Device export web interface
panel_icon: mdi:lightbulb-multiple
panel_title: Cync LAN
