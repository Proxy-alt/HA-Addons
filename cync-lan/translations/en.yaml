configuration:
  account_username:
    name: Cync Account Email
    description: >-
      Email address for your Cync/C by GE account. Only used by the export
      web UI to pull your device list from the cloud — required if Export
      Device List is enabled.
  account_password:
    name: Cync Account Password
    description: >-
      Password for your Cync/C by GE account. Only used by the export web
      UI — required if Export Device List is enabled.
  enable_exporter:
    name: Export Device List
    description: >-
      Enables the web UI on port 23778 used to export your device list from
      the Cync cloud into a local mesh file. Requires the account email and
      password above. Disable once you've exported your devices if you don't
      want the export UI reachable.
  secret_key:
    name: Secret Key
    description: >-
      Encrypts the cached Cync cloud auth token at rest. Leave empty to
      auto-generate one on first start — it is then saved back to this
      option automatically.
  mqtt_host:
    name: MQTT Broker Host
    description: >-
      Hostname or IP of your MQTT broker. Defaults to "core-mosquitto", the
      internal address of the official Mosquitto broker add-on.
  mqtt_port:
    name: MQTT Broker Port
    description: Port of your MQTT broker.
  mqtt_user:
    name: MQTT Username
    description: Username for the MQTT broker, if authentication is required.
  mqtt_password:
    name: MQTT Password
    description: Password for the MQTT broker, if authentication is required.
  mqtt_topic:
    name: MQTT Topic Prefix
    description: Topic prefix cync-lan publishes device state and commands under.
  max_tcp_connections:
    name: Max Device Connections
    description: >-
      Maximum number of Cync Wi-Fi devices that can connect to the LAN
      server simultaneously.
  tcp_whitelist:
    name: Device IP Whitelist
    description: >-
      Optional list of IPs allowed to connect to the LAN server. Leave empty
      to allow any device that resolves this add-on's address via DNS
      override.
  cloud_ip:
    name: Cync Cloud IP
    description: >-
      IP address of the real Cync cloud server, used to keep the phone app
      working while devices are redirected to this add-on. Only change this
      if the upstream cloud IP changes.
  debug:
    name: Debug Logging
    description: Enable verbose debug logging.
